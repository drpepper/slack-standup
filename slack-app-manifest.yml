display_information:
  name: Standup Bot
  description: Randomizes standup speaking order for your channel.
  background_color: "#2c2d30"

features:
  slash_commands:
    - command: /standup
      description: Start or manage standup order
      usage_hint: "[@user1 @user2 ...] | next | add @user | remove @user | status | end"
      should_escape: false
  bot_user:
    display_name: Standup Bot
    always_online: false

oauth_config:
  scopes:
    bot:
      - channels:read       # list public channel members
      - groups:read         # list private channel members
      - users:read          # fetch user profiles and presence (filter bots)
      - chat:write          # post messages
      - commands            # respond to slash commands

settings:
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
